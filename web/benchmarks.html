<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSP → WebAssembly 벤치마크 | MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        label {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        
        input[type="range"] {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            cursor: pointer;
        }
        
        input[type="text"], input[type="number"] {
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            width: 100%;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat h3 {
            font-size: 2em;
            margin-bottom: 5px;
            color: #4facfe;
        }
        
        .stat p {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            height: 400px;
        }
        
        canvas {
            max-height: 100%;
        }
        
        .visualizer {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            height: 300px;
        }
        
        canvas#visualizer {
            width: 100%;
            height: 100%;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.5em;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #4facfe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 DSP → WebAssembly MVP</h1>
            <p>C99 DSP 라이브러리를 WebAssembly로 컴파일하여 실시간 테스트</p>
        </div>
        
        <div class="card">
            <h2>🎛️ 파라미터 설정</h2>
            <div class="controls">
                <div class="control-group">
                    <label>FFT 사이즈</label>
                    <input type="number" id="fftSize" value="2048" min="256" max="16384" step="256">
                    <div class="value-display" id="fftSizeValue">2048</div>
                </div>
                
                <div class="control-group">
                    <label>샘플 레이트</label>
                    <input type="range" id="sampleRate" value="48000" min="8000" max="96000" step="1000">
                    <div class="value-display" id="sampleRateValue">48000 Hz</div>
                </div>
                
                <div class="control-group">
                    <label>반복 횟수</label>
                    <input type="number" id="iterations" value="100" min="10" max="1000" step="10">
                    <div class="value-display" id="iterationsValue">100</div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" id="runBenchmark" onclick="runBenchmark()">🚀 벤치마크 실행</button>
                <button class="btn-secondary" id="visualizeFFT" onclick="visualizeFFT()">📊 시각화</button>
            </div>
        </div>
        
        <div class="card">
            <h2>📊 성능 지표</h2>
            <div class="stats">
                <div class="stat">
                    <h3 id="cTime">--</h3>
                    <p>C99 (ms)</p>
                </div>
                <div class="stat">
                    <h3 id="wasmTime">--</h3>
                    <p>WASM (ms)</p>
                </div>
                <div class="stat">
                    <h3 id="speedup">--</h3>
                    <p>속도 향상</p>
                </div>
                <div class="stat">
                    <h3 id="opsPerSec">--</h3>
                    <p>Ops/Sec</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 성능 비교</h2>
            <div class="charts">
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>🎨 FFT 시각화</h2>
            <div class="visualizer">
                <canvas id="visualizer"></canvas>
                <div class="loading" id="visualizerLoading" style="display: none;">
                    <div class="spinner"></div>
                    <p>FFT 연산 중...</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>💻 최적화 결과</h2>
            <div id="optimizationResults">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>최적화 분석 중...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // WebAssembly 로드
        let fftModule = null;
        
        // WebAssembly 인스턴스화
        async function loadWasm() {
            const response = await fetch('build/fft.js');
            const buffer = await response.arrayBuffer();
            const module = await WebAssembly.instantiate(buffer, {
                env: {
                    memory: new WebAssembly.Memory({ initial: 8192, maximum: 65536 })
                },
                imports: {
                    memory: new WebAssembly.Memory({ initial: 8192, maximum: 65536 })
                }
            });
            
            fftModule = module.instance.exports;
            console.log('✅ WebAssembly 로드 완료!');
            return module;
        }
        
        // 벤치마크 함수
        function runBenchmark() {
            const fftSize = parseInt(document.getElementById('fftSize').value);
            const iterations = parseInt(document.getElementById('iterations').value);
            
            console.log(`🚀 벤치마크 시작: FFT ${fftSize}, 반복 ${iterations}회`);
            
            // C99 벤치마크 (시뮬레이션)
            const cTime = measureTime(() => {
                simulateC99FFT(fftSize, iterations);
            });
            
            // WebAssembly 벤치마크
            const wasmTime = measureTime(() => {
                if (fftModule) {
                    for (let i = 0; i < iterations; i++) {
                        fftModule._fft_radix2(fftSize);
                    }
                }
            });
            
            // 결과 표시
            displayResults(cTime, wasmTime, fftSize, iterations);
        }
        
        // C99 시뮬레이션
        function simulateC99FFT(fftSize, iterations) {
            // C99의 O(n log n) 알고리즘 시뮬레이션
            const n = fftSize;
            
            for (let iter = 0; iter < iterations; iter++) {
                // Radix-2 Decimation
                const bits = Math.log2(n);
                const size = 2;
                
                // Bit Reversal
                const reversed = [];
                for (let i = 0; i < n; i++) {
                    let j = 0;
                    let temp = i;
                    for (let b = 0; b < bits; b++) {
                        j = (j << 1) | (temp & 1);
                        temp >>= 1;
                    }
                    reversed[j] = i;
                }
                
                // Cooley-Tukey
                for (let size = 2; size <= n; size <<= 1) {
                    const halfsize = size >> 1;
                    
                    for (let i = 0; i < n; i += size) {
                        for (let j = 0; j < halfsize; j++) {
                            const k = i + j;
                            const l = k + halfsize;
                            
                            // Twiddle Factors (시뮬레이션)
                            const w_re = Math.cos(2 * Math.PI * j / size);
                            const w_im = Math.sin(2 * Math.PI * j / size);
                            
                            const z_re = Math.random(); // 입력 시뮬레이션
                            const z_im = Math.random();
                            
                            const w_zr_re = w_re * z_re - w_im * z_im;
                            const w_zr_im = w_re * z_im + w_im * z_re;
                            
                            // z + w*z'
                            const ar = z_re + w_zr_re;
                            const ai = z_im + w_zr_im;
                            
                            // 시뮬레이션에서 데이터 업데이트는 생략
                        }
                    }
                }
            }
        }
        
        // 시간 측정
        function measureTime(fn) {
            const start = performance.now();
            fn();
            return performance.now() - start;
        }
        
        // 결과 표시
        function displayResults(cTime, wasmTime, fftSize, iterations) {
            const speedup = cTime / wasmTime;
            const cOps = fftSize * Math.log2(fftSize) * iterations;
            const opsPerSec = cOps / (cTime / 1000);
            
            document.getElementById('cTime').textContent = cTime.toFixed(2);
            document.getElementById('wasmTime').textContent = wasmTime.toFixed(2);
            document.getElementById('speedup').textContent = speedup.toFixed(2) + 'x';
            document.getElementById('opsPerSec').textContent = (opsPerSec / 1000000).toFixed(2) + ' M';
            
            // 성능 그래프
            updatePerformanceChart(cTime, wasmTime, fftSize);
            
            // 최적화 제안
            generateOptimizationSuggestions(cTime, wasmTime, speedup);
        }
        
        // 시각화
        function visualizeFFT() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            // FFT 시각화 (시뮬레이션)
            const bars = 128;
            const barWidth = width / bars;
            
            for (let i = 0; i < bars; i++) {
                const magnitude = Math.random(); // 시뮬레이션
                const barHeight = magnitude * height * 0.8;
                const x = i * barWidth;
                const y = (height - barHeight) / 2;
                
                // 색상 그라디언트
                const gradient = ctx.createLinearGradient(0, y, 0, y + barHeight);
                gradient.addColorStop(0, '#f093fb');
                gradient.addColorStop(1, '#f5576c');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, barWidth - 1, barHeight);
            }
            
            document.getElementById('visualizerLoading').style.display = 'none';
        }
        
        // 성능 차트 업데이트
        function updatePerformanceChart(cTime, wasmTime, fftSize) {
            const ctx = document.getElementById('performanceChart');
            
            // Chart.js 시뮬레이션 데이터
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['C99', 'WebAssembly'],
                    datasets: [{
                        label: '실행 시간 (ms)',
                        data: [cTime, wasmTime],
                        backgroundColor: ['rgba(79, 70, 229, 0.8)', 'rgba(0, 255, 136, 0.8)']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.2)'
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.2)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white'
                            }
                        }
                    }
                }
            });
        }
        
        // 최적화 제안 생성
        function generateOptimizationSuggestions(cTime, wasmTime, speedup) {
            let suggestions = [];
            
            if (speedup < 1.5) {
                suggestions.push({
                    type: 'warning',
                    text: '⚠️ SIMD 최적화가 필요합니다. AVX2/SSE4.2 명령어를 활용하세요.'
                });
            } else if (speedup >= 2.0) {
                suggestions.push({
                    type: 'success',
                    text: '✅ WebAssembly 최적화가 성공적입니다! 속도 향상이 우수합니다.'
                });
            }
            
            if (cTime > 100) {
                suggestions.push({
                    type: 'warning',
                    text: '⚠️ C99 코드가 너무 느립니다. 메모리 정렬과 데이터 구조를 최적화하세요.'
                });
            }
            
            suggestions.push({
                type: 'info',
                text: '💡 Linear Memory WebAssembly 사용을 권장합니다. 캐시 친화 효율이 향상됩니다.'
            });
            
            const resultsDiv = document.getElementById('optimizationResults');
            resultsDiv.innerHTML = suggestions.map(s => `
                <div style="background: rgba(${s.type === 'success' ? '0,255,136' : s.type === 'warning' ? '255,100,0' : '79,70,229'}, 0.2); padding: 10px; border-radius: 5px; margin-bottom: 5px;">
                    ${s.text}
                </div>
            `).join('');
        }
        
        // 이벤트 리스너
        document.getElementById('fftSize').addEventListener('input', (e) => {
            document.getElementById('fftSizeValue').textContent = e.target.value;
        });
        
        document.getElementById('sampleRate').addEventListener('input', (e) => {
            document.getElementById('sampleRateValue').textContent = e.target.value + ' Hz';
        });
        
        document.getElementById('iterations').addEventListener('input', (e) => {
            document.getElementById('iterationsValue').textContent = e.target.value + '회';
        });
        
        // 페이지 로드 시 WebAssembly 로드 시도
        window.addEventListener('load', () => {
            loadWasm().catch(error => {
                console.error('❌ WebAssembly 로드 실패:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <h3>❌ WebAssembly 로드 실패</h3>
                        <p>${error.message}</p>
                        <p>build/compile_wasm.sh 스크립트를 먼저 실행하세요.</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
